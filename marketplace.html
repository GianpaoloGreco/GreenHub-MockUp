      <div class="hidden lg:block text-left">

        <h1 class="text-3xl md:text-4xl font-black tracking-tight mb-2">Marketplace Azioni ESG</h1>
        <p class="text-white/60">Servizi professionali per la tua transizione sostenibile</p>
      </div>

      <!-- Search bar + Filtri button -->
      <div class="flex items-center gap-3 mb-6">
        <div class="relative flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-4 top-1/2 -translate-y-1/2 text-white/40"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>

        </div>
        <button class="px-5 py-3 rounded-lg text-sm font-semibold bg-card border border-card-border text-white/70 hover:text-white hover:border-white/20 transition-all flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>

        <button class="px-5 py-2 rounded-full text-sm font-semibold bg-card border border-card-border text-white/70 hover:text-white hover:border-white/20 transition-all">Energia</button>
        <button class="px-5 py-2 rounded-full text-sm font-semibold bg-card border border-card-border text-white/70 hover:text-white hover:border-white/20 transition-all">Certificazioni</button>
        <button class="px-5 py-2 rounded-full text-sm font-semibold bg-card border border-card-border text-white/70 hover:text-white hover:border-white/20 transition-all">Consulenza</button>
        <button class="px-5 py-2 rounded-full text-sm font-semibold bg-card border border-card-border text-white/70 hover:text-white hover:border-white/20 transition-all">Formazione</button>
        <button class="px-5 py-2 rounded-full text-sm font-semibold bg-card border border-card-border text-white/70 hover:text-white hover:border-white/20 transition-all">Tecnologia</button>
      </div>

      <!-- Single card - marketplace quasi vuoto -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

        <!-- Card 1 - unica -->
        <div class="bg-card border border-card-border rounded-xl overflow-hidden hover:border-white/15 transition-all group">
          <div class="relative h-48 overflow-hidden">
            <img src="IMG PH/efficienza.jpeg" alt="Azione ESG 1" class="w-full h-full object-cover">
            <span class="absolute top-3 left-3 px-3 py-1 rounded-full text-xs font-bold bg-primary text-black">-10% CO2</span>

          <div class="p-5">
            <h3 class="text-lg font-bold text-white mb-3 group-hover:text-primary transition-colors">Azione ESG 1</h3>
            <div class="flex items-center gap-4 mb-4">
              <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white/40"><line x1="12" x2="12" y1="2" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                <span class="text-sm text-white/60">Da: <span class="text-white font-semibold">3000</span></span>
              </div>
              <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-white/40"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
                <span class="text-sm text-white/60">Tempistiche: <span class="text-white font-semibold">3 giorni</span></span>
              </div>
            </div>
            <button class="w-full py-3 bg-primary text-black font-bold rounded-lg hover:bg-primary-dark transition-all text-sm">Richiedi Preventivo &rarr;</button>
